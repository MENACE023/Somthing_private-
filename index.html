<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>For Esha ❤️</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Floating Hearts -->
    <div class="hearts"></div>

    <!-- Main Container -->
    <div class="container">

        <!-- Glass Card -->
        <div class="card">

            <!-- Hero GIF -->
            

            <!-- Heading -->
            <h1>
                💖 ESHA 💖
            </h1>

            <!-- Question -->
            <h2 class="question">
                I have something important to ask you... 🥺❤️
            </h2>

            <p class="subText">
                Will you be mine forever?
            </p>

            <!-- Funny Messages -->
            <div id="message">
                Choose wisely 😏
            </div>

            <!-- Buttons -->
            <div class="buttonArea">

                <button id="yesBtn">
                    YES ❤️
                </button>

                <button id="noBtn">
                    NO 😈
                </button>

            </div>

            <!-- Result Screen -->
            <div id="result">

                <h2 class="resultTitle">
                    💖 YOU SAID YES 💖
                </h2>

                <p class="resultText">
                    You just made me the happiest person alive 🥰
                </p>

                <!-- Slideshow GIF -->
                <img id="gifPlayer"
                    src="Assets/bears-hugging-i-love-you-rybi46bujxb2ki7c.gif"
                    alt="Love GIF">

                <div class="loveText">
                    I LOVE YOU ❤️
                </div>

            </div>

        </div>

    </div>

    <!-- Music -->
    <audio id="music">

        <source
            src="Assets/love-me-love-me-spotdownorg_pNmllNE8.mp3"
            type="audio/mpeg">

    </audio>

    <!-- Confetti Canvas -->
    <canvas id="confetti"></canvas>

    <!-- JavaScript -->
    <script src="script.js"></script>

</body>

</html>
